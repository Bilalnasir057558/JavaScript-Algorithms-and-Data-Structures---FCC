<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Palindrome Checker</title> 

    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <h1>Palindrome Checker</h1>
    <div id="checker">
    <div id="input-section">
      <label for="text-input">Enter a word or phrase to check for palindrome:</label>
      <input type="text" id="text-input">
      <button type="submit" id="check-btn">Check</button>
      </div>
      <p id="result"></p>
    </div>
    <div id="note">   
💡 A palindrome is a word or phrase that can be read the same way forwards and backwards, ignoring punctuation, case, and spacing.
    </div>
    <script src="script.js"></script>
  </body>
</html>
